<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience — Archie Midgley</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="body--project">
    <!-- Navigation: back goes to index.html#experience -->
    <nav class="nav" id="nav">
        <a href="index.html#experience" class="nav__back" aria-label="Back to Experience">
            <svg width="40" height="40" viewBox="0 0 40 40">
                <path d="M24 12L16 20L24 28" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
        </a>
        <div class="nav__indicator">
            <span class="nav__section-label" id="expLabel">Experience</span>
        </div>
    </nav>

    <main class="project-detail">
        <!-- Hero -->
        <section class="project-detail__hero">
            <div class="project-detail__hero-inner">
                <span class="project-detail__category" id="expCategory">Experience</span>
                <h1 class="project-detail__title" id="expTitle">Company Name</h1>
                <div class="project-detail__meta">
                    <div class="project-detail__meta-item">
                        <span class="project-detail__meta-label">Period</span>
                        <span class="project-detail__meta-value" id="expPeriod">2024 — Present</span>
                    </div>
                    <div class="project-detail__meta-item">
                        <span class="project-detail__meta-label">Role</span>
                        <span class="project-detail__meta-value" id="expRole">Design Engineer</span>
                    </div>
                    <div class="project-detail__meta-item">
                        <span class="project-detail__meta-label">Location</span>
                        <span class="project-detail__meta-value" id="expLocation">United Kingdom</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Hero Image -->
        <section class="project-detail__hero-image">
            <div class="project-detail__image-full">
                <img src="" alt="" class="project-detail__img" id="expHeroImg">
                <div class="project__image-placeholder"><span>Hero Image</span></div>
            </div>
        </section>

        <!-- Overview -->
        <section class="project-detail__section">
            <div class="project-detail__container">
                <div class="project-detail__two-col">
                    <div class="project-detail__col-label">
                        <h2 class="project-detail__heading">Overview</h2>
                    </div>
                    <div class="project-detail__col-content" id="expOverview"></div>
                </div>
            </div>
        </section>

        <!-- Image Gallery Row 1 — two images -->
        <section class="project-detail__gallery">
            <div class="project-detail__container">
                <div class="project-detail__gallery-grid project-detail__gallery-grid--two">
                    <div class="project-detail__gallery-item">
                        <img src="" alt="Experience image 1" class="project-detail__img" id="expImg1" 
                        <div class="project__image-placeholder"><span>Image 1</span></div>
                    </div>
                    <div class="project-detail__gallery-item">
                        <img src="" alt="Experience image 2" class="project-detail__img" id="expImg2" 
                        <div class="project__image-placeholder"><span>Image 2</span></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Responsibilities -->
        <section class="project-detail__section">
            <div class="project-detail__container">
                <div class="project-detail__two-col">
                    <div class="project-detail__col-label">
                        <h2 class="project-detail__heading">Responsibilities</h2>
                    </div>
                    <div class="project-detail__col-content" id="expResponsibilities"></div>
                </div>
            </div>
        </section>

        <!-- Skills & Tools -->
        <section class="project-detail__section">
            <div class="project-detail__container">
                <div class="project-detail__two-col">
                    <div class="project-detail__col-label">
                        <h2 class="project-detail__heading">Skills &amp; Tools</h2>
                    </div>
                    <div class="project-detail__col-content">
                        <div class="project-detail__tags" id="expTags"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Image Gallery Row 2 — three images in a line -->
        <section class="project-detail__gallery">
            <div class="project-detail__container">
                <div class="project-detail__gallery-grid project-detail__gallery-grid--three">
                    <div class="project-detail__gallery-item">
                        <img src="" alt="Experience image 3" class="project-detail__img" id="expImg3" 
                        <div class="project__image-placeholder"><span>Image 3</span></div>
                    </div>
                    <div class="project-detail__gallery-item">
                        <img src="" alt="Experience image 4" class="project-detail__img" id="expImg4" 
                        <div class="project__image-placeholder"><span>Image 4</span></div>
                    </div>
                    <div class="project-detail__gallery-item">
                        <img src="" alt="Experience image 5" class="project-detail__img" id="expImg5" 
                        <div class="project__image-placeholder"><span>Image 5</span></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Navigation between experiences -->
        <section class="project-detail__nav-section">
            <div class="project-detail__container">
                <div class="project-detail__nav-links">
                    <a href="" class="project-detail__nav-link project-detail__nav-link--prev" id="prevExp" style="visibility:hidden">
                        <span class="project-detail__nav-direction">Previous</span>
                        <span class="project-detail__nav-title" id="prevExpTitle"></span>
                    </a>
                    <a href="" class="project-detail__nav-link project-detail__nav-link--next" id="nextExp" style="visibility:hidden">
                        <span class="project-detail__nav-direction">Next</span>
                        <span class="project-detail__nav-title" id="nextExpTitle"></span>
                    </a>
                </div>
            </div>
        </section>

    </main>

    <!-- Theme Switcher -->
    <div class="theme-switcher" id="themeSwitcher">
        <button class="theme-switcher__btn theme-switcher__btn--light active" data-theme="light" aria-label="Light theme"></button>
        <button class="theme-switcher__btn theme-switcher__btn--dark" data-theme="dark" aria-label="Dark theme"></button>
    </div>

    <script src="js/cursor.js"></script>
    <script src="js/experience.js"></script>
</body>
</html>
